<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" role="img" aria-label="Code-Aware PR Review">
  <!-- Bespoke thumbnail: a miniature code-aware PR review screen (two panes:
       file list + full-file diff with added/removed lines and a comment marker).
       Mock data only. -->
  <rect width="240" height="160" rx="12" fill="#12181f"/>

  <!-- window title bar with PR pill and CI status dot -->
  <rect x="12" y="12" width="216" height="20" rx="6" fill="#1f2933"/>
  <circle cx="24" cy="22" r="4" fill="#2f9e44"/>
  <rect x="34" y="18" width="70" height="8" rx="4" fill="#3e4c59"/>
  <rect x="196" y="17" width="24" height="10" rx="5" fill="#26333f"/>
  <rect x="200" y="20" width="16" height="4" rx="2" fill="#5c7cfa"/>

  <!-- left pane: changed-file list -->
  <rect x="12" y="38" width="66" height="110" rx="6" fill="#1a222b"/>
  <rect x="20" y="48" width="42" height="7" rx="3" fill="#5c7cfa"/>
  <rect x="20" y="62" width="50" height="6" rx="3" fill="#3e4c59"/>
  <rect x="20" y="74" width="38" height="6" rx="3" fill="#3e4c59"/>
  <rect x="20" y="86" width="46" height="6" rx="3" fill="#3e4c59"/>
  <rect x="20" y="98" width="34" height="6" rx="3" fill="#3e4c59"/>

  <!-- right pane: full-file diff view -->
  <rect x="84" y="38" width="144" height="110" rx="6" fill="#0e141a"/>
  <!-- gutter -->
  <rect x="84" y="38" width="14" height="110" rx="6" fill="#161d25"/>

  <!-- context line -->
  <rect x="104" y="48" width="90" height="6" rx="3" fill="#3a4652"/>
  <!-- removed line -->
  <rect x="98" y="60" width="124" height="10" rx="2" fill="#3a1d22"/>
  <rect x="104" y="62" width="70" height="6" rx="3" fill="#e03131"/>
  <!-- added line -->
  <rect x="98" y="72" width="124" height="10" rx="2" fill="#16331f"/>
  <rect x="104" y="74" width="86" height="6" rx="3" fill="#2f9e44"/>
  <!-- added line -->
  <rect x="98" y="84" width="124" height="10" rx="2" fill="#16331f"/>
  <rect x="104" y="86" width="58" height="6" rx="3" fill="#2f9e44"/>
  <!-- context lines -->
  <rect x="104" y="100" width="100" height="6" rx="3" fill="#3a4652"/>
  <rect x="104" y="112" width="76" height="6" rx="3" fill="#3a4652"/>

  <!-- inline comment marker -->
  <rect x="150" y="124" width="70" height="18" rx="5" fill="#1f2933"/>
  <circle cx="160" cy="133" r="4" fill="#5c7cfa"/>
  <rect x="168" y="130" width="44" height="5" rx="2" fill="#52606d"/>
</svg>
